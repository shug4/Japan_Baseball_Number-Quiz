<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
  <script src="index.js" defer></script>
</head>

<body>
  <div id="game-root">
    <h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">
      日本野球審判袖番号クイズゲーム
    </h2>

    <div id="start-screen">
      <h2>日本野球 審判袖番号クイズ</h2>
      <p>審判の名前が表示されます。できるだけ速く袖番号を入力してください。</p>
      <div id="team-select">
        <label>球団：</label>
        <div id="team-btns">
          <button class="team-btn selected" data-file="all">すべて</button>
          <div class="league-label">セ・リーグ</div>
          <button class="team-btn" data-file="tigers.json">阪神</button>
          <button class="team-btn" data-file="baystars.json">DeNA</button>
          <button class="team-btn" data-file="giants.json">巨人</button>
          <button class="team-btn" data-file="dragons.json">中日</button>
          <button class="team-btn" data-file="carp.json">広島</button>
          <button class="team-btn" data-file="swallows.json">ヤクルト</button>
          <div class="league-label">パ・リーグ</div>
          <button class="team-btn" data-file="hawks.json">ソフトバンク</button>
          <button class="team-btn" data-file="fighters.json">日本ハム</button>
          <button class="team-btn" data-file="buffaloes.json">オリックス</button>
          <button class="team-btn" data-file="eagles.json">楽天</button>
          <button class="team-btn" data-file="lions.json">西武</button>
          <button class="team-btn" data-file="marines.json">ロッテ</button>
          <div class="league-label">その他</div>
          <button class="team-btn" data-file="umpires.json">審判</button>
        </div>
      </div>
      <div id="q-count-select">
        <label>問題数：</label>
        <div id="q-count-btns">
          <button class="q-count-btn" data-count="5">5問</button>
          <button class="q-count-btn selected" data-count="10">10問</button>
          <button class="q-count-btn" data-count="20">20問</button>
          <button class="q-count-btn" data-count="50">50問</button>
          <button class="q-count-btn" data-count="100">100問</button>
        </div>
      </div>
      <button id="start-btn">スタート</button>
    </div>

    <div id="game-screen" style="display:none;">
      <div id="stats-row">
        <div class="stat-card">
          <p class="stat-label">問題</p>
          <p class="stat-value" id="q-count">1 / 10</p>
        </div>
        <div class="stat-card">
          <p class="stat-label">正解</p>
          <p class="stat-value" id="score">0</p>
        </div>
        <div class="stat-card">
          <p class="stat-label">平均タイム</p>
          <p class="stat-value" id="avg-time">—</p>
        </div>
      </div>
      <div id="question-box">
        <p id="team-name">—</p>
        <p id="umpire-name">—</p>
        <p id="prompt-text">背番号を入力してください</p>
      </div>
      <div id="timer-bar-wrap">
        <div id="timer-bar" style="width:100%"></div>
      </div>
      <div id="feedback"></div>
      <div id="answer-area">
        <input id="answer-input" type="number" min="1" max="99" placeholder="番号" autocomplete="off" />
        <button id="submit-btn">決定</button>
      </div>
      <button id="quit-btn">やめる</button>
    </div>

    <div id="result-screen" style="display:none;">
      <h2>結果</h2>
      <div id="result-stats-row" class="stat-card"
        style="display:flex;justify-content:space-around;padding:1rem;margin-bottom:1.5rem;border:0.5px solid var(--color-border-tertiary);">
        <div>
          <p class="stat-label">正解数</p>
          <p class="stat-value" id="final-score">0/10</p>
        </div>
        <div>
          <p class="stat-label">平均タイム</p>
          <p class="stat-value" id="final-avg">—</p>
        </div>
        <div>
          <p class="stat-label">最速</p>
          <p class="stat-value" id="final-best">—</p>
        </div>
      </div>
      <table id="result-table">
        <thead>
          <tr>
            <th>球団</th>
            <th>名前</th>
            <th>番号</th>
            <th>あなたの答え</th>
            <th>タイム</th>
            <th>結果</th>
          </tr>
        </thead>
        <tbody id="result-body"></tbody>
      </table>
      <button id="retry-btn">もう一度</button>
      <button id="home-btn">タイトルに戻る</button>
    </div>
  </div>


</body>

</html>
